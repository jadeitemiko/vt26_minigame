<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clicking game 1.1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>The great clicking game</h1>
<p>How many times can you click the button in one minute?
    Try and compete against the class.</p>
<div id="gamebox" class="gamebox">
    <div>
        <label for="name-input">Your name here</label>
        <input type="text" id="name-input" name="name" placeholder="Username (2-16 chars)">
        <p>
        <button id="click-button" class="click-button">Click me!</button>
        </p>
    </div>
    <div id="scorebox" class="scorebox">
        <h2>Score</h2>
        <p>Score: <span id="score-display">0</span></p>
        <p>Countdown timer: <span id="timer-display">##</span></p>
        <button id="submit-button" class="minor-button" disabled>Submit score</button>
    </div>
<div><h2>Another round?</h2>
    <button id="again-button" class="minor-button">Play again!</button>
</div>
</div>
<hr>

<div class="footer-text">Content created by G. Gomez, 2026 as part of

<script src="js/script.js"></script>
</body>
</html>
